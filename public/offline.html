<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — CampaignForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #f0ece6;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f0ece6;
    }
    p {
      color: #9a9087;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 400px;
    }
    button {
      margin-top: 1.75rem;
      padding: 0.75rem 1.75rem;
      background: #c9a84c;
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div>
    <div class="icon">&#9876;&#65039;</div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet. Intenta recargar cuando vuelvas a estar conectado.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
